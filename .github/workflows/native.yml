name: Native

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ruby-advisory-scan:
    name: Ruby advisory scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Check native advisory pipeline contract
        run: ruby scripts/check-native-advisory-pipeline.rb
      - name: Scan Ruby dependencies for advisories
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/native-advisory"
          ruby scripts/scan-ruby-advisories.rb \
            --output "$RUNNER_TEMP/native-advisory/ruby-advisory-report.json"
      - name: Upload Ruby advisory report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ruby-advisory-report-${{ github.sha }}-${{ github.run_id }}
          path: ${{ runner.temp }}/native-advisory/ruby-advisory-report.json
          if-no-files-found: ignore
          retention-days: 30

  swift-tests:
    name: Swift tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Run Swift or Xcode tests when testable sources exist
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f Package.swift ]; then
            swift_log="$RUNNER_TEMP/swift-tests.log"
            swift test --disable-xctest --parallel -Xswiftc -warnings-as-errors 2>&1 | tee "$swift_log"
            ruby scripts/fail-on-warning.rb --log "$swift_log"

          elif [ -d Spoonjoy.xcodeproj ]; then
            ios_destination="$(python3 .github/scripts/resolve-ios-simulator-destination.py)"
            ios_test_log="$RUNNER_TEMP/xcode-ios-tests.log"
            macos_build_log="$RUNNER_TEMP/xcode-macos-build.log"
            xcodebuild test -project Spoonjoy.xcodeproj -scheme "Spoonjoy iOS" -configuration BootstrapDebug -destination "$ios_destination" CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee "$ios_test_log"
            ruby scripts/fail-on-warning.rb --log "$ios_test_log"
            xcodebuild build -project Spoonjoy.xcodeproj -scheme "Spoonjoy macOS" -configuration BootstrapDebug -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee "$macos_build_log"
            ruby scripts/fail-on-warning.rb --log "$macos_build_log"
          elif ls ./*.xcodeproj >/dev/null 2>&1; then
            echo "Unexpected Xcode project name; expected Spoonjoy.xcodeproj."
            exit 1
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi
      - name: Run non-launch native UI geometry regressions
        run: |
          set -euo pipefail
          ios_destination="$(python3 .github/scripts/resolve-ios-simulator-destination.py)"
          simulator_arch="$(uname -m)"
          ui_geometry_log="$RUNNER_TEMP/native-ui-geometry-tests.log"
          xcodebuild test \
            -project Spoonjoy.xcodeproj \
            -scheme "Spoonjoy iOS" \
            -configuration BootstrapDebug \
            -destination "$ios_destination,arch=$simulator_arch" \
            -only-testing:SpoonjoyUITests/NativeScreenshotEvidenceTests \
            -skip-testing:SpoonjoyUITests/NativeScreenshotEvidenceTests/testObservedAccessibilityAndGeometry \
            CODE_SIGNING_ALLOWED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            2>&1 | tee "$ui_geometry_log"
          ruby scripts/fail-on-warning.rb --log "$ui_geometry_log"

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Check native design-language contract
        run: ruby scripts/check-native-design-language.rb --web-design-doc docs/source/spoonjoy-v2-design-language.md
      - name: Check native project and surface contracts
        run: |
          set -euo pipefail
          ruby scripts/check-native-web-palette-contract.rb --web-css docs/source/spoonjoy-v2-tailwind-colors.css
          bundle exec ruby scripts/check-xcode-project-contract.rb
          bundle exec ruby scripts/check-xcode-generator-contract.rb
          ruby scripts/check-kitchen-recipe-surfaces.rb
          ruby scripts/check-cook-shopping-surfaces.rb
          ruby scripts/check-search-capture-settings-surfaces.rb
          ruby scripts/check-launch-screenshot-contract.rb
      - name: Generate AASA validation or blocker artifact
        run: ruby scripts/validate-aasa.rb --artifact-root "$RUNNER_TEMP/aasa"
      - name: Run native scenario verifier when present
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f scripts/verify-native-scenarios.sh ]; then
            test -x scripts/verify-native-scenarios.sh
            scenario_log="$RUNNER_TEMP/native-scenario.log"
            scripts/verify-native-scenarios.sh --stage final 2>&1 | tee "$scenario_log"
            ruby scripts/fail-on-warning.rb --log "$scenario_log"
          elif [ -f Package.swift ] || [ -d Spoonjoy.xcodeproj ] || ls ./*.xcodeproj >/dev/null 2>&1; then
            echo "Native scenario verifier is required once Swift or Xcode sources exist."
            exit 1
          else
            echo "Native scenario verifier not present yet; bootstrap check passes."
          fi

  app-bundle:
    name: App bundle
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Build iOS and macOS app bundles when Xcode project exists
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -d Spoonjoy.xcodeproj ]; then
            ios_build_log="$RUNNER_TEMP/xcode-ios-build.log"
            macos_build_log="$RUNNER_TEMP/xcode-macos-build.log"
            xcodebuild -project Spoonjoy.xcodeproj -scheme "Spoonjoy iOS" -configuration BootstrapDebug -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES build 2>&1 | tee "$ios_build_log"
            ruby scripts/fail-on-warning.rb --log "$ios_build_log"
            xcodebuild -project Spoonjoy.xcodeproj -scheme "Spoonjoy macOS" -configuration BootstrapDebug -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES build 2>&1 | tee "$macos_build_log"
            ruby scripts/fail-on-warning.rb --log "$macos_build_log"
          elif ls ./*.xcodeproj >/dev/null 2>&1; then
            echo "Unexpected Xcode project name; expected Spoonjoy.xcodeproj."
            exit 1
          elif [ -f Package.swift ]; then
            echo "Xcode project is required once Package.swift exists."
            exit 1
          else
            echo "Xcode project not present yet; bootstrap check passes."
          fi

  coverage:
    name: Coverage
    runs-on: macos-26
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Generate and enforce Swift or Xcode coverage when testable sources exist
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f Package.swift ]; then
            coverage_log="$RUNNER_TEMP/swift-coverage.log"
            swift test --enable-code-coverage --disable-xctest --parallel -Xswiftc -warnings-as-errors 2>&1 | tee "$coverage_log"
            ruby scripts/fail-on-warning.rb --log "$coverage_log"
            coverage_json="$(swift test --show-codecov-path)"
            if [ -f scripts/enforce-swift-coverage.rb ]; then
              ruby scripts/enforce-swift-coverage.rb --coverage-json "$coverage_json" --minimum 100 --include 'Sources/SpoonjoyCore'
            else
              echo "Coverage enforcement script is required once Package.swift exists."
              exit 1
            fi
          elif ls ./*.xcodeproj >/dev/null 2>&1; then
            echo "Coverage enforcement requires Package.swift and scripts/enforce-swift-coverage.rb before any Xcode project lands."
            exit 1
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi

  native-visual-evidence:
    name: Native visual evidence
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - ruby-advisory-scan
      - swift-tests
      - native-scenario-verifier
      - app-bundle
      - coverage
    runs-on: macos-26
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      visual-artifact-id: ${{ steps.artifact-metadata.outputs.artifact-id }}
      visual-artifact-name: ${{ steps.seal.outputs.artifact-name }}
      visual-artifact-digest: ${{ steps.artifact-metadata.outputs.artifact-digest }}
      visual-manifest-digest: ${{ steps.seal.outputs.manifest-digest }}
      source-tree: ${{ steps.seal.outputs.source-tree }}
    steps:
      - name: Check out exact Native source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Capture the complete native screenshot matrix
        run: |
          set -euo pipefail
          scripts/capture-native-screenshot-matrix.sh \
            --artifact-root "$RUNNER_TEMP/native-visual-matrix" \
            --unit-slug release \
            --require-full-matrix

      - name: Seal exact-run visual evidence
        id: seal
        run: |
          set -euo pipefail
          source_tree="$(git rev-parse "${GITHUB_SHA}^{tree}")"
          artifact_name="native-visual-evidence-${GITHUB_SHA}-${GITHUB_RUN_ID}-${{ github.run_attempt }}"
          ruby scripts/testflight-visual-evidence.rb seal \
            --artifact-root "$RUNNER_TEMP/native-visual-matrix" \
            --matrix-manifest "$RUNNER_TEMP/native-visual-matrix/apple/release-route-matrix.json" \
            --output-dir "$RUNNER_TEMP/native-visual-evidence" \
            --source-sha "$GITHUB_SHA" \
            --source-tree "$source_tree" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --workflow-job "native-visual-evidence" \
            --github-output "$GITHUB_OUTPUT"
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "source-tree=$source_tree" >> "$GITHUB_OUTPUT"

      - name: Reverify sealed evidence before upload
        run: |
          set -euo pipefail
          ruby scripts/testflight-visual-evidence.rb verify \
            --artifact-dir "$RUNNER_TEMP/native-visual-evidence" \
            --source-sha "$GITHUB_SHA" \
            --source-tree "${{ steps.seal.outputs.source-tree }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --workflow-job "native-visual-evidence" \
            --manifest-sha256 "${{ steps.seal.outputs.manifest-digest }}"

      - name: Upload immutable visual evidence
        id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ steps.seal.outputs.artifact-name }}
          path: ${{ runner.temp }}/native-visual-evidence
          if-no-files-found: error
          include-hidden-files: false
          overwrite: false
          retention-days: 90

      - name: Normalize uploaded artifact identity
        id: artifact-metadata
        env:
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]] || {
            echo "Visual artifact ID is not a positive integer." >&2
            exit 1
          }
          if [[ "$ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            normalized_digest="sha256:$ARTIFACT_DIGEST"
          elif [[ "$ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            normalized_digest="$ARTIFACT_DIGEST"
          else
            echo "Visual artifact digest is not SHA-256." >&2
            exit 1
          fi
          echo "artifact-id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "artifact-digest=$normalized_digest" >> "$GITHUB_OUTPUT"

  testflight-release-note:
    name: TestFlight release note
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - ruby-advisory-scan
      - swift-tests
      - native-scenario-verifier
      - app-bundle
      - coverage
      - native-visual-evidence
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out exact Native source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Create exact-SHA TestFlight release note
        run: |
          set -euo pipefail
          note_dir="$RUNNER_TEMP/testflight-release-note"
          mkdir -p "$note_dir"
          notes="$(git log -1 --format=%s "$GITHUB_SHA" | tr '\n\r' '  ')"
          [[ -n "${notes//[[:space:]]/}" ]] || {
            echo "The exact source commit must have a non-empty subject for TestFlight notes." >&2
            exit 1
          }
          notes="${notes:0:4000}"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq -n \
            --arg sourceSha "$GITHUB_SHA" \
            --arg sourceTree "${{ needs.native-visual-evidence.outputs.source-tree }}" \
            --argjson nativeRunId "$GITHUB_RUN_ID" \
            --argjson nativeRunAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg generatedAt "$generated_at" \
            --arg notes "$notes" \
            --argjson visualArtifactId "${{ needs.native-visual-evidence.outputs.visual-artifact-id }}" \
            --arg visualArtifactName "${{ needs.native-visual-evidence.outputs.visual-artifact-name }}" \
            --arg visualArtifactDigest "${{ needs.native-visual-evidence.outputs.visual-artifact-digest }}" \
            --arg visualManifestSha256 "${{ needs.native-visual-evidence.outputs.visual-manifest-digest }}" \
            '{
              schemaVersion: 2,
              sourceSha: $sourceSha,
              sourceTree: $sourceTree,
              nativeRunId: $nativeRunId,
              nativeRunAttempt: $nativeRunAttempt,
              generatedAt: $generatedAt,
              notes: $notes,
              visualEvidence: {
                artifactId: $visualArtifactId,
                artifactName: $visualArtifactName,
                artifactDigest: $visualArtifactDigest,
                manifestSha256: $visualManifestSha256,
                workflowRunId: $nativeRunId,
                workflowRunAttempt: $nativeRunAttempt,
                workflowJob: "native-visual-evidence",
                jobName: "Native visual evidence"
              }
            }' > "$note_dir/testflight-release-notes.json"

      - name: Upload exact-SHA TestFlight release note
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: testflight-release-notes-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/testflight-release-note/testflight-release-notes.json
          if-no-files-found: error
          retention-days: 90
