name: Native

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-tests:
    name: Swift tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Run Swift or Xcode tests when testable sources exist
        run: |
          set -euo pipefail

          if [ -f Package.swift ]; then
            swift test
          elif ls *.xcodeproj >/dev/null 2>&1; then
            project="$(ls *.xcodeproj | head -n 1)"
            xcodebuild test -project "$project" -scheme Spoonjoy -destination 'generic/platform=iOS Simulator'
            xcodebuild test -project "$project" -scheme Spoonjoy -destination 'generic/platform=macOS'
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Run native scenario verifier when present
        run: |
          set -euo pipefail

          if [ -x scripts/verify-native-scenarios.sh ]; then
            scripts/verify-native-scenarios.sh
          else
            echo "Native scenario verifier not present yet; bootstrap check passes."
          fi

  app-bundle:
    name: App bundle
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build iOS and macOS app bundles when Xcode project exists
        run: |
          set -euo pipefail

          if ls *.xcodeproj >/dev/null 2>&1; then
            project="$(ls *.xcodeproj | head -n 1)"
            xcodebuild -project "$project" -scheme Spoonjoy -destination 'generic/platform=iOS Simulator' build
            xcodebuild -project "$project" -scheme Spoonjoy -destination 'generic/platform=macOS' build
          else
            echo "Xcode project not present yet; bootstrap check passes."
          fi

  coverage:
    name: Coverage
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Generate Swift or Xcode coverage when testable sources exist
        run: |
          set -euo pipefail

          if [ -f Package.swift ]; then
            swift test --enable-code-coverage
          elif ls *.xcodeproj >/dev/null 2>&1; then
            project="$(ls *.xcodeproj | head -n 1)"
            xcodebuild test -project "$project" -scheme Spoonjoy -destination 'generic/platform=iOS Simulator' -enableCodeCoverage YES
            xcodebuild test -project "$project" -scheme Spoonjoy -destination 'generic/platform=macOS' -enableCodeCoverage YES
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi
