name: Native

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift-tests:
    name: Swift tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Run Swift or Xcode tests when testable sources exist
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f Package.swift ]; then
            swift_log="$RUNNER_TEMP/swift-tests.log"
            swift test --disable-xctest --parallel -Xswiftc -warnings-as-errors 2>&1 | tee "$swift_log"
            ruby scripts/fail-on-warning.rb --log "$swift_log"
          elif [ -d Spoonjoy.xcodeproj ]; then
            ios_destination="$(python3 .github/scripts/resolve-ios-simulator-destination.py)"
            ios_test_log="$RUNNER_TEMP/xcode-ios-tests.log"
            macos_test_log="$RUNNER_TEMP/xcode-macos-tests.log"
            xcodebuild test -project Spoonjoy.xcodeproj -scheme "Spoonjoy iOS" -configuration BootstrapDebug -destination "$ios_destination" CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee "$ios_test_log"
            ruby scripts/fail-on-warning.rb --log "$ios_test_log"
            xcodebuild test -project Spoonjoy.xcodeproj -scheme "Spoonjoy macOS" -configuration BootstrapDebug -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES 2>&1 | tee "$macos_test_log"
            ruby scripts/fail-on-warning.rb --log "$macos_test_log"
          elif ls *.xcodeproj >/dev/null 2>&1; then
            echo "Unexpected Xcode project name; expected Spoonjoy.xcodeproj."
            exit 1
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi

  native-scenario-verifier:
    name: Native scenario verifier
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Check native design-language contract
        run: ruby scripts/check-native-design-language.rb --web-design-doc docs/source/spoonjoy-v2-design-language.md
      - name: Check native project and surface contracts
        run: |
          set -euo pipefail
          ruby scripts/check-native-web-palette-contract.rb --web-css docs/source/spoonjoy-v2-tailwind-colors.css
          bundle exec ruby scripts/check-xcode-project-contract.rb
          bundle exec ruby scripts/check-xcode-generator-contract.rb
          ruby scripts/check-kitchen-recipe-surfaces.rb
          ruby scripts/check-cook-shopping-surfaces.rb
          ruby scripts/check-search-capture-settings-surfaces.rb
          ruby scripts/check-launch-screenshot-contract.rb
      - name: Generate AASA validation or blocker artifact
        run: ruby scripts/validate-aasa.rb --artifact-root "$RUNNER_TEMP/aasa"
      - name: Run native scenario verifier when present
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f scripts/verify-native-scenarios.sh ]; then
            test -x scripts/verify-native-scenarios.sh
            scenario_log="$RUNNER_TEMP/native-scenario.log"
            scripts/verify-native-scenarios.sh --stage final 2>&1 | tee "$scenario_log"
            ruby scripts/fail-on-warning.rb --log "$scenario_log"
          elif [ -f Package.swift ] || [ -d Spoonjoy.xcodeproj ] || ls *.xcodeproj >/dev/null 2>&1; then
            echo "Native scenario verifier is required once Swift or Xcode sources exist."
            exit 1
          else
            echo "Native scenario verifier not present yet; bootstrap check passes."
          fi

  app-bundle:
    name: App bundle
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Build iOS and macOS app bundles when Xcode project exists
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -d Spoonjoy.xcodeproj ]; then
            ios_build_log="$RUNNER_TEMP/xcode-ios-build.log"
            macos_build_log="$RUNNER_TEMP/xcode-macos-build.log"
            xcodebuild -project Spoonjoy.xcodeproj -scheme "Spoonjoy iOS" -configuration BootstrapDebug -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES build 2>&1 | tee "$ios_build_log"
            ruby scripts/fail-on-warning.rb --log "$ios_build_log"
            xcodebuild -project Spoonjoy.xcodeproj -scheme "Spoonjoy macOS" -configuration BootstrapDebug -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO GCC_TREAT_WARNINGS_AS_ERRORS=YES build 2>&1 | tee "$macos_build_log"
            ruby scripts/fail-on-warning.rb --log "$macos_build_log"
          elif ls *.xcodeproj >/dev/null 2>&1; then
            echo "Unexpected Xcode project name; expected Spoonjoy.xcodeproj."
            exit 1
          elif [ -f Package.swift ]; then
            echo "Xcode project is required once Package.swift exists."
            exit 1
          else
            echo "Xcode project not present yet; bootstrap check passes."
          fi

  coverage:
    name: Coverage
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'
      - name: Generate and enforce Swift or Xcode coverage when testable sources exist
        run: |
          set -euo pipefail
          unexpected_projects="$(find . -maxdepth 1 -name '*.xcodeproj' ! -name 'Spoonjoy.xcodeproj' -print)"
          if [ -n "$unexpected_projects" ]; then
            echo "Unexpected Xcode project(s):"
            echo "$unexpected_projects"
            exit 1
          fi

          if [ -f Package.swift ]; then
            coverage_log="$RUNNER_TEMP/swift-coverage.log"
            swift test --enable-code-coverage --disable-xctest --parallel -Xswiftc -warnings-as-errors 2>&1 | tee "$coverage_log"
            ruby scripts/fail-on-warning.rb --log "$coverage_log"
            coverage_json="$(swift test --show-codecov-path)"
            if [ -f scripts/enforce-swift-coverage.rb ]; then
              ruby scripts/enforce-swift-coverage.rb --coverage-json "$coverage_json" --minimum 100 --include 'Sources/SpoonjoyCore'
            else
              echo "Coverage enforcement script is required once Package.swift exists."
              exit 1
            fi
          elif ls *.xcodeproj >/dev/null 2>&1; then
            echo "Coverage enforcement requires Package.swift and scripts/enforce-swift-coverage.rb before any Xcode project lands."
            exit 1
          else
            echo "No Package.swift or Xcode project present yet; bootstrap check passes."
          fi
