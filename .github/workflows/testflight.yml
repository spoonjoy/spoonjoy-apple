name: TestFlight

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character main commit SHA to release
        required: true
        type: string
      allow_rollback:
        description: Allow an older main ancestor as an explicit rollback
        required: true
        default: false
        type: boolean
      rollback_reason:
        description: Required reason when allow_rollback selects an older main commit
        required: false
        type: string
      rollback_notes:
        description: Fresh TestFlight notes when rollback evidence predates note artifacts
        required: false
        type: string
      build_number:
        description: Optional App Store Connect build number override
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: spoonjoy-testflight-internal
  cancel-in-progress: false

jobs:
  reject-untrusted-dispatch:
    name: Reject untrusted dispatch
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Reject workflow code outside main
        run: |
          echo "TestFlight must be dispatched with workflow ref main." >&2
          exit 1

  release-gate:
    name: Validate release dispatch
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      ALLOW_ROLLBACK: ${{ inputs.allow_rollback }}
      ROLLBACK_REASON: ${{ inputs.rollback_reason }}
      ROLLBACK_NOTES: ${{ inputs.rollback_notes }}
    steps:
      - name: Validate exact-SHA inputs
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_sha must be exactly 40 lowercase hexadecimal characters." >&2
            exit 1
          }
          if [[ "$ALLOW_ROLLBACK" == "true" && -z "${ROLLBACK_REASON//[[:space:]]/}" ]]; then
            echo "rollback_reason is required when allow_rollback is true." >&2
            exit 1
          fi

  publish-internal:
    name: Publish internal TestFlight
    needs: release-gate
    environment: internal-testflight
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Check out trusted release controls
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Check out selected source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_sha }}
          path: release-source
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact Native release evidence
        id: candidate
        working-directory: release-source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          ALLOW_ROLLBACK: ${{ inputs.allow_rollback }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
          ROLLBACK_NOTES: ${{ inputs.rollback_notes }}
        run: |
          set -euo pipefail
          ../scripts/verify-testflight-release-candidate.rb \
            --source-sha "$SOURCE_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --allow-rollback "$ALLOW_ROLLBACK" \
            --rollback-reason "$ROLLBACK_REASON" \
            --rollback-notes "$ROLLBACK_NOTES" \
            --output-dir artifacts/apple/ci-testflight/release-candidate

      - name: Upload verified candidate note
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testflight-release-candidate-note-${{ inputs.source_sha }}-${{ github.run_id }}
          path: ${{ steps.candidate.outputs.release_notes_path }}
          if-no-files-found: error
          retention-days: 90

      - name: Check out pinned apple-distribution-kit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ourostack/apple-distribution-kit
          ref: 4f3dd7bee99bae5b8e6807b5e0c94ed01cda52eb
          path: .ci/apple-distribution-kit
          persist-credentials: false

      - name: Build pinned apple-distribution-kit
        working-directory: .ci/apple-distribution-kit
        run: |
          set -euo pipefail
          npm ci --loglevel=error
          npm audit --audit-level=moderate
          npm run build
          echo "APPLE_DISTRIBUTION_KIT_BIN=$PWD/dist/cli.js" >> "$GITHUB_ENV"

      - name: Verify Xcode 26.5+ runner
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version)"
          printf '%s\n' "$xcode_version"
          first_line="$(printf '%s\n' "$xcode_version" | sed -n '1p')"
          minimum_xcode_version="26.5"
          version="${first_line#Xcode }"
          awk -v version="$version" -v minimum="$minimum_xcode_version" 'BEGIN { split(version, actual, "."); split(minimum, required, "."); exit !((actual[1] + 0) > (required[1] + 0) || ((actual[1] + 0) == (required[1] + 0) && (actual[2] + 0) >= (required[2] + 0))) }'

      - name: Prepare App Store Connect credentials
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          ASC_PROVIDER_PUBLIC_ID: ${{ secrets.APP_STORE_CONNECT_PROVIDER_PUBLIC_ID }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "$ASC_KEY_ID" ]] || missing+=("APP_STORE_CONNECT_API_KEY_ID")
          [[ -n "$ASC_ISSUER_ID" ]] || missing+=("APP_STORE_CONNECT_API_ISSUER_ID")
          [[ -n "$ASC_KEY_BASE64" ]] || missing+=("APP_STORE_CONNECT_API_KEY_BASE64")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          asc_dir="$RUNNER_TEMP/app-store-connect"
          mkdir -p "$asc_dir"
          key_path="$asc_dir/AuthKey.p8"
          config_path="$asc_dir/config.json"

          python3 - "$key_path" <<'PY'
          import base64
          import os
          import pathlib
          import sys

          pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(os.environ["ASC_KEY_BASE64"], validate=True))
          PY
          chmod 600 "$key_path"

          python3 - "$config_path" "$ASC_KEY_ID" "$ASC_ISSUER_ID" "$key_path" <<'PY'
          import json
          import pathlib
          import sys

          config_path, key_id, issuer_id, key_path = sys.argv[1:5]
          pathlib.Path(config_path).write_text(
              json.dumps({
                  "keyId": key_id,
                  "issuerId": issuer_id,
                  "privateKeyPath": key_path
              }),
              encoding="utf-8",
          )
          PY
          chmod 600 "$config_path"

          {
            echo "APPLE_DISTRIBUTION_KIT_CONFIG=$config_path"
            echo "APP_STORE_CONNECT_PROVIDER_PUBLIC_ID=${ASC_PROVIDER_PUBLIC_ID:-9735080289}"
          } >> "$GITHUB_ENV"

      - name: Publish exact candidate to Spoonjoy Internal
        working-directory: release-source
        env:
          SPOONJOY_TESTFLIGHT_SOURCE_ROOT: ${{ github.workspace }}/release-source
          SPOONJOY_TESTFLIGHT_BUILD_NUMBER: ${{ inputs.build_number }}
          SPOONJOY_TESTFLIGHT_SOURCE_SHA: ${{ steps.candidate.outputs.source_sha }}
          SPOONJOY_TESTFLIGHT_RELEASE_NOTES_PATH: ${{ steps.candidate.outputs.release_notes_path }}
        run: ../scripts/ci-publish-testflight.sh

      - name: Summarize publish
        if: always()
        run: |
          set -euo pipefail
          summary_path="release-source/artifacts/apple/ci-testflight/testflight-publish-summary.json"
          if [[ -f "$summary_path" ]]; then
            {
              echo "## TestFlight publish"
              echo
              jq -r '
                "- Source SHA: \(.sourceSha)",
                "- App Store Connect app id: \(.appId)",
                "- Build: \(.buildNumber) (\(.buildId))",
                "- Build beta detail id: \(.buildBetaDetailId)",
                "- Group: \(.groupName) (\(.groupId))",
                "- Internal state: \(.internalBuildState)",
                "- Testers notified requested: \(.testersNotifiedRequested)"
              ' "$summary_path"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload publish artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: testflight-publish-artifacts-${{ inputs.source_sha }}
          path: release-source/artifacts/apple/ci-testflight
          if-no-files-found: error
          retention-days: 90
